<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная - Главная панель</title>
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>
<div class="app-layout">

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo-placeholder">
                    <img class="logo-placeholder" src="public/img/Logo2-removebg-preview.png">
            </div>

            <nav class="nav-menu">
                <a href="#" class="nav-item active" title="Мои заявки">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </a>
                <a href="#" class="nav-item" title="Мой профиль">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
                <a href="#" class="nav-item" title="Учреждения">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
                </a>
                <a href="#" class="nav-item" title="Пользователи">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                </a>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <a href="#" class="nav-item position-relative" title="Уведомления">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                <span class="notification-badge">3</span>
            </a>
            <a href="#" class="nav-item logout" title="Выход">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </a>
        </div>
    </aside>

    <main class="main-content">

        <header class="top-header">
            <div class="header-left">
                <h2 class="page-title">Список заявок</h2>

                <div class="role-tabs">
                    <button class="tab-btn active">Полученные</button>
                    <button class="tab-btn">Отправленные</button>
                </div>
            </div>

            <div class="header-right">
                <button class="action-btn-primary">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Создать заявку
                </button>
            </div>
        </header>

        <div class="content-body">
            <div class="data-card">
                <div class="table-toolbar">
                    <div class="filters">
                        <button class="filter-btn">
                            Все типы
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        <button class="filter-btn">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                            Фильтры
                        </button>
                    </div>

                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" placeholder="Поиск заявок...">
                    </div>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th width="40"><input type="checkbox"></th>
                            <th>ТЕМА ЗАЯВКИ</th>
                            <th>СТАТУС</th>
                            <th>СОЗДАЛ</th>
                            <th>ДАТА СОЗДАНИЯ</th>
                            <th width="50"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td><input type="checkbox"></td>
                            <td><span class="item-name">Ошибка входа в систему</span></td>
                            <td><span class="status-badge status-new">Новая</span></td>
                            <td>
                                <div class="user-cell">
                                    <div class="user-avatar">И</div>
                                    <div class="user-info">
                                        <span class="user-email">ivanov@example.com</span>
                                        <span class="user-role">Пользователь</span>
                                    </div>
                                </div>
                            </td>
                            <td>25.03.2026 10:15</td>
                            <td><button class="more-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg></button></td>
                        </tr>
                        <tr>
                            <td><input type="checkbox"></td>
                            <td><span class="item-name">Обновление справочников</span></td>
                            <td><span class="status-badge status-in-progress">В работе</span></td>
                            <td>
                                <div class="user-cell">
                                    <div class="user-avatar">П</div>
                                    <div class="user-info">
                                        <span class="user-email">petrov@example.com</span>
                                        <span class="user-role">Админ учреждения</span>
                                    </div>
                                </div>
                            </td>
                            <td>24.03.2026 16:44</td>
                            <td><button class="more-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="19" cy="12" r="1"></circle><circle cx="5" cy="12" r="1"></circle></svg></button></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination">
                    <span class="page-info">1 – 2 из 2</span>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
